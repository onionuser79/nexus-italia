gateway_id: NEXUS-ITALIA-[sigla provincia]
site_name: "NEXUS-ITALIA [provincia]"
region: [regione]
mesh_id: mesh-[provincia]
radio_band: "868"
channel_name: NEXUS
channel_number: 1
channel_scope: "it-lom-mi"
channel_secret: "a45768ab48e203498edbc11b35cdfbd7"  # 32-char hex = 16 bytes key
path_hash_mode: 1  # 0=1byte(256 IDs), 1=2byte(65536 IDs), 2=3byte(16M IDs)
protocol_version: "1.0"

meshcore:
  serial_port: /dev/ttyUSB0
  baudrate: 115200
  mode: serial

mqtt:
  host: mqtt.example.org
  port: 1883
  username: NEXUS-ITALIA-[sigla provincia]
  password: [password da richiedere a info@meshcoreitalia.it]
  keepalive: 30
  tls: false
  uplink_topic: nexus/v1/uplink
  downlink_topic: nexus/v1/downlink/NEXUS-ITALIA-[sigla provincia]
  heartbeat_topic: nexus/v1/heartbeat/NEXUS-ITALIA-[sigla provincia]
  status_topic: nexus/v1/status/NEXUS-ITALIA-[sigla provincia]

runtime:
  dedupe_ttl_sec: 180
  heartbeat_interval_sec: 30
  poll_interval_sec: 5
  log_level: INFO
  beacon_interval_sec: 10800
  beacon_channel: 2
  beacon_text: "NEXUS-ITALIA Gateway [sigla provincia] - meshcoreitalia.it"
  advert_enabled: true             # advert 0hop
  advert_interval_sec: 3600        # ogni 1 ora
  flood_advert_enabled: true       # flood advert
  flood_advert_interval_sec: 10800 # ogni 3 ore
